name: Build and Release

# Build on every push to main (verification) + every tag v*.*.* (release).
# workflow_dispatch lets you trigger a build manually from the Actions tab.
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

# The release job needs `contents: write` to create GitHub releases
# and attach assets to them. The build job additionally needs:
#   - contents: write   -> push snapshot diff PNGs to the orphan
#                          `snapshot-previews` branch on test failure.
#   - pull-requests: write -> create / update the sticky PR comment
#                          showing the old-vs-new diff inline.
# Both extra usages are gated on `pull_request` + same-repo HEAD so
# fork PRs (read-only GITHUB_TOKEN by GitHub design) just skip them.
permissions:
  contents: write
  pull-requests: write

env:
  SOLUTION: XR_APILAYER_MLEDOUR_xr_telemetry.sln
  LAYER_NAME: XR_APILAYER_MLEDOUR_xr_telemetry
  # Hoisted to workflow level so the cache key (Restore step) and the
  # download step (Install step) reference the same version. Bumping
  # this triggers a fresh download because the cache key changes —
  # exactly the behavior we want for Certum MSI updates.
  SIMPLYSIGN_VERSION: '9.4.3.90'

jobs:
  # ---------------------------------------------------------------------------
  # Build: Debug + Release in parallel via matrix. Always runs.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.configuration }} x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release, Debug]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # fetch-depth: 0 lets softprops/action-gh-release auto-generate
          # release notes from the full commit history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Decide once, up front, whether this run will code-sign anything.
      # We sign ONLY when ALL of these are true:
      #   1. We're on a tag push (refs/tags/v*) — i.e. an actual release.
      #      Push-to-main, PR, and workflow_dispatch builds are unsigned
      #      because they're not user-facing artifacts and signing them
      #      would burn a Certum HSM session per push for no benefit.
      #   2. The matrix entry is Release (Debug is never signed).
      #   3. The CERTUM_USERNAME secret is set. PR/fork builds don't have
      #      access to secrets by GitHub design, so this also keeps them
      #      green automatically.
      # Computing it here (and nowhere else) keeps the per-step `if:`
      # conditions tidy and avoids referencing `secrets.*` directly in a
      # step-level `if:`, which is not allowed.
      - name: Determine signing eligibility
        id: signing
        shell: pwsh
        env:
          CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
        run: |
          $isTagBuild     = $env:GITHUB_REF -like 'refs/tags/v*'
          $isReleaseEntry = ('${{ matrix.configuration }}' -eq 'Release')
          $hasSecret      = -not [string]::IsNullOrEmpty($env:CERTUM_USERNAME)
          $eligible       = $isTagBuild -and $isReleaseEntry -and $hasSecret
          Write-Host "isTagBuild     = $isTagBuild  (ref=$env:GITHUB_REF)"
          Write-Host "isReleaseEntry = $isReleaseEntry"
          Write-Host "hasSecret      = $hasSecret"
          Write-Host "should_sign    = $eligible"
          "should_sign=$($eligible.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "${{ env.SOLUTION }}"

      # Expose the release version to MSBuild's pre-build script
      # (scripts\Generate-VersionRc.ps1) so the VERSIONINFO resource baked
      # into the DLL — and the installer filename, and the runtime log
      # banner — match the git tag that triggered this build.
      #
      # Resolution order:
      #   1. refs/tags/v<semver>         -> clean "<semver>" (e.g. 0.0.8)
      #   2. any build after an existing tag  -> git-describe progression
      #      (e.g. 0.0.8-5-gabc1234) so PR + main-push artifacts show
      #      how far ahead of the last release they are, not a misleading
      #      "0.0.0-dev-..." that predates every release.
      #   3. no tags yet (fresh fork)   -> fall back to "0.0.0-dev-<sha>".
      #
      # Requires fetch-depth: 0 on actions/checkout — already set above.
      - name: Compute layer version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(\d+\.\d+\.\d+.*)$') {
            $version = $matches[1]
          } else {
            $desc = git describe --tags --always 2>$null
            if ($LASTEXITCODE -eq 0 -and $desc -match '^v\d+\.\d+\.\d+') {
              # e.g. "v0.0.8-5-gabc1234" -> "0.0.8-5-gabc1234"
              $version = $desc -replace '^v', ''
            } else {
              $shortSha = $env:GITHUB_SHA.Substring(0, 7)
              $version = "0.0.0-dev-$shortSha"
            }
          }
          Write-Host "LAYER_VERSION=$version"
          "LAYER_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build ${{ matrix.configuration }} | x64
        run: >-
          msbuild "${{ env.SOLUTION }}"
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=x64
          /m
          /verbosity:minimal
          /nologo

      # ---- Code signing (tag pushes only, Release matrix only) -------
      #
      # Gated by `should_sign` (set in "Determine signing eligibility"
      # above). PR builds, push-to-main, workflow_dispatch, fork builds
      # and Debug entries all skip these steps automatically.
      #
      # Order matters: the DLL is signed BEFORE staging and BEFORE the
      # installer build, so the signature ends up in the manual ZIP AND
      # is embedded as-is inside the Setup.exe (Inno Setup just bundles
      # the file). The Setup.exe itself is signed in a later step,
      # after ISCC has produced it.
      #
      # SimplySign Desktop is the Certum-side prerequisite: it owns the
      # cloud HSM session and bridges the cert into the Windows
      # certificate store so signtool /sha1 <thumbprint> can pick it up.
      # There is NO Chocolatey package; the only public install path is
      # the MSI from files.certum.eu. We pin SIMPLYSIGN_VERSION so a
      # Certum-side "latest" can't silently break the undocumented
      # /autologin flag Sign-Artifact.ps1 relies on (see
      # docs/DEVELOPMENT.md "Brittleness notes"). Bumping is a
      # deliberate act — retest /autologin against the new version
      # locally before merging.
      #
      # MSI cache: the file is ~50-100 MB and Certum's CDN sometimes
      # throttles. Caching it on the cache key SIMPLYSIGN_VERSION saves
      # the download (~30 s typical) on subsequent runs. We do NOT
      # cache the installed Program Files tree because the MSI
      # registers components the cert-store bridge depends on, and a
      # plain directory copy would skip that registration.
      - name: Restore cached SimplySign Desktop MSI
        if: steps.signing.outputs.should_sign == 'true'
        id: cache-simplysign-msi
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/SimplySignDesktop.msi
          key: simplysign-msi-${{ env.SIMPLYSIGN_VERSION }}

      - name: Install SimplySign Desktop
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          $msi = "$env:RUNNER_TEMP\SimplySignDesktop.msi"
          if ((Test-Path $msi) -and (Get-Item $msi).Length -ge 1MB) {
            Write-Host ("Using cached MSI: {0} ({1:N0} bytes)" -f $msi, (Get-Item $msi).Length)
          } else {
            $url = "https://files.certum.eu/software/SimplySignDesktop/Windows/$env:SIMPLYSIGN_VERSION/SimplySignDesktop-$env:SIMPLYSIGN_VERSION-64-bit-en.msi"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $msi -UseBasicParsing
            if (-not (Test-Path $msi) -or (Get-Item $msi).Length -lt 1MB) {
              throw "MSI download looks invalid: $msi"
            }
          }
          Write-Host "Installing silently ..."
          $p = Start-Process -FilePath msiexec.exe `
                             -ArgumentList @('/i', $msi, '/qn', '/norestart') `
                             -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            throw "msiexec exited $($p.ExitCode)"
          }
          # Verify the binary ended up where Sign-Artifact.ps1 expects it.
          # The 64-bit MSI installs to `C:\Program Files\` (the real
          # 64-bit hive), NOT `Program Files (x86)`.
          $exe = 'C:\Program Files\Certum\SimplySign Desktop\SimplySignDesktop.exe'
          if (-not (Test-Path $exe)) {
            # Search both Program Files hives just in case the layout
            # changed in a newer Certum build — fail loudly with the
            # actual path so the next bump in SIMPLYSIGN_VERSION is
            # easy to fix.
            $found = Get-ChildItem 'C:\Program Files*\' -Recurse -Filter 'SimplySignDesktop.exe' -ErrorAction SilentlyContinue
            throw "SimplySignDesktop.exe not at expected path. Found instead: $($found.FullName -join '; ')"
          }
          Write-Host "Installed: $exe"

      # Sign the DLL BEFORE staging and BEFORE building the installer, so
      # the signature lands in both the manual-install ZIP and embedded
      # inside the Setup.exe (Inno Setup just bundles the file as-is).
      # Setup.exe itself is signed in a later step.
      - name: Sign DLL (Certum SimplySign)
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        env:
          CERTUM_USERNAME:        ${{ secrets.CERTUM_USERNAME }}
          CERTUM_TOTP_SEED:       ${{ secrets.CERTUM_TOTP_SEED }}
          CERTUM_CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT }}
        run: |
          .\scripts\Sign-Artifact.ps1 -Path "bin\x64\Release\${{ env.LAYER_NAME }}.dll"

      # Run the test binary. It covers two layers:
      #   - Unit tests (test_crop_math.cpp)    : pure crop-math helpers.
      #   - Integration tests (test_integration.cpp): drive the real
      #     OpenXrLayer class against a mock OpenXR runtime, exercising
      #     xrEnumerateViewConfigurationViews / xrLocateViews / xrEndFrame
      #     and the swapchain bookkeeping without needing a loader, a GPU,
      #     or a real HMD. This is the bar every PR must clear.
      # The binary is built by the same msbuild invocation as the layer DLL
      # (it's a second project in the .sln) and drops alongside the DLL in
      # bin\x64\<config>\. A non-zero exit fails the job.
      - name: Run unit + integration tests (${{ matrix.configuration }} | x64)
        shell: pwsh
        run: |
          $exe = "bin\x64\${{ matrix.configuration }}\openxr-api-layer-tests.exe"
          if (-not (Test-Path $exe)) {
            throw "Test binary not found at $exe"
          }
          # --reporters=console for a readable log in the GitHub Actions UI;
          # --force-colors so the Actions terminal renders pass/fail nicely.
          & $exe --reporters=console --force-colors
          if ($LASTEXITCODE -ne 0) {
            throw "openxr-api-layer-tests.exe returned $LASTEXITCODE"
          }

      # ---- Sticky PR comment: success path ------------------------------
      #
      # Counterpart of "Upsert sticky PR comment with snapshot diff" below.
      # When the snapshot test passes on a PR that previously had a
      # failure comment, this step rewrites that comment to "now
      # passing" so reviewers aren't misled by stale failure UI. No-op
      # if no prior sticky comment exists for this PR.
      #
      # Step `if:` is implicit `success()` — i.e. this runs only when
      # the test step (and every earlier step in the job) succeeded.
      # If the test failed, this step is skipped and the dedicated
      # failure-path step below posts the diff instead. We gate on
      # Release-only to mirror the failure path (avoids the Debug and
      # Release matrix jobs racing on the same comment ID).
      #
      # `head.repo.full_name == github.repository` excludes fork PRs,
      # where GITHUB_TOKEN is read-only and `gh api PATCH` would 403.
      # Same-repo PRs get the inline experience; fork PRs degrade
      # gracefully to the artifact-only flow.
      - name: Update sticky PR comment if snapshot test now passes
        if: matrix.configuration == 'Release' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Pull ALL comments (paginated) then jq-filter for the
          # marker. Two-stage capture (full output, then head -n1) so
          # we never SIGPIPE gh under `set -o pipefail`. Empty result
          # = no prior sticky comment, treat as no-op.
          ALL_IDS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("<!-- snapshot-preview-bot -->"))) | .id')
          COMMENT_ID=$(echo "$ALL_IDS" | head -n1)
          if [ -z "$COMMENT_ID" ]; then
            echo "No prior sticky snapshot comment - nothing to update."
            exit 0
          fi
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}/attempts/${RUN_ATTEMPT}"
          BODY=$(cat <<EOF
          <!-- snapshot-preview-bot -->
          ## Overlay snapshot test now passing

          The overlay snapshot test passes as of run [\`${RUN_ID}\` attempt ${RUN_ATTEMPT}](${RUN_URL}).
          EOF
          )
          # Use --input via jq so the JSON body is correctly escaped
          # regardless of newlines / backticks / pipes in BODY.
          jq -n --arg body "$BODY" '{body: $body}' \
            | gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          echo "Updated sticky comment ${COMMENT_ID} to 'now passing'."

      # ---- Snapshot diff artifact (on test failure, Release only) -------
      #
      # When the snapshot test fails ("snapshot diverges from golden: N
      # pixels differ; first at (x, y)"), the test runner exits non-
      # zero and the step above throws — but the PNG was written to
      # disk BEFORE the comparison check, so it's still available on
      # the runner.
      #
      # This step grabs both the freshly-rendered PNG and the
      # committed golden, stages them under new/ and old/ so a
      # reviewer can download the artifact and diff them in any
      # image viewer, exactly the same UX as the
      # update-overlay-snapshot.yml workflow but for the
      # automatic-CI failure case. Without this, the only way to see
      # the diff is to either pull the branch + build locally on
      # Windows or trigger the manual regen workflow — both are too
      # much friction for "I want to see the 5 pixels that changed."
      #
      # `if: failure()` runs when ANY earlier step in the job failed.
      # Release-only to avoid duplicate uploads (Debug and Release
      # render bit-identically because the entire pipeline is
      # software WIC + D2D).
      - name: Stage snapshot diff (on test failure)
        if: failure() && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact/snapshot-diff/new | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/snapshot-diff/old | Out-Null
          # The fresh render is written to the runner's workspace
          # root (CWD when the test EXE runs). Absent only if the
          # test bailed at an earlier REQUIRE before the encoder ran
          # — in that case the upload still happens but contains
          # only the golden, which is enough to confirm the issue is
          # pre-encode and not a pixel diff.
          if (Test-Path overlay_snapshot.png) {
            Copy-Item overlay_snapshot.png artifact/snapshot-diff/new/overlay_snapshot.png
            Write-Host "Staged fresh render: $((Get-Item overlay_snapshot.png).Length) bytes"
          } else {
            Write-Host "::warning::overlay_snapshot.png not found — test likely bailed before the PNG encoder ran"
          }
          if (Test-Path screenshots/overlay_snapshot.png) {
            Copy-Item screenshots/overlay_snapshot.png artifact/snapshot-diff/old/overlay_snapshot.png
            Write-Host "Staged current golden: $((Get-Item screenshots/overlay_snapshot.png).Length) bytes"
          }

          # actions/upload-artifact@v4 rejects names containing any of
          # / \ : * ? " < > | (NTFS path-illegal chars). github.ref_name
          # on a pull_request event is "<PR_number>/merge" — the slash
          # makes the upload fail. On a regular push it's the branch
          # name, which CAN also contain slashes (`feat/foo`, `ci-test/
          # bar`, …). Sanitise by replacing any non-[A-Za-z0-9-_.] with
          # a dash, then publish the result as an env var the upload
          # step below consumes.
          $rawRef = '${{ github.ref_name }}'
          $safeRef = $rawRef -replace '[^a-zA-Z0-9\-_.]', '-'
          Write-Host "ref_name raw='$rawRef' sanitised='$safeRef'"
          "ARTIFACT_REF_TAG=$safeRef" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload snapshot diff (on test failure)
        if: failure() && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          # ARTIFACT_REF_TAG comes from the staging step above — it's
          # the github.ref_name sanitised against actions/upload-artifact
          # @v4's naming rules. run_attempt distinguishes re-runs so two
          # downloads of the same failing PR don't collide.
          name: overlay-snapshot-diff-${{ env.ARTIFACT_REF_TAG }}-${{ github.run_attempt }}
          path: artifact/snapshot-diff/
          if-no-files-found: warn

      # ---- Inline PR comment: push diff PNGs to orphan branch -----------
      #
      # GitHub artifacts (the step above) are downloadable ZIPs — they
      # do NOT render inline in PR comments or in the PR description.
      # To show the old-vs-new diff at-a-glance to a reviewer, the
      # PNGs need to live at an URL that GitHub-Flavoured Markdown
      # will embed via `![alt](url)`. The cleanest GitHub-native
      # storage for that is an orphan branch in this same repo —
      # referenced from the comment via
      # `github.com/<owner>/<repo>/raw/<sha>/...` URLs (NOT the
      # `raw.githubusercontent.com` form, which is an unauthenticated
      # CDN that 404s for private repos — see the URL construction in
      # the upsert step below).
      #
      # Why orphan branch and not `main`:
      #   - binary PNGs would bloat `main`'s history forever
      #   - a dedicated branch can be pruned (per-PR folders deleted
      #     when the PR closes) without rewriting `main`'s history
      #
      # Path layout: `pr-<num>/run-<id>-attempt-<k>/{old,new}.png`.
      # Per-attempt folders avoid filename collisions when CI is
      # re-run and let reviewers compare different attempts.
      #
      # Why pin the raw URL on a commit SHA rather than the branch
      # ref: branch-tipped URLs are mutated by every subsequent push,
      # so the PR comment from run 7 would silently show run 9's
      # PNGs after a re-run. SHA-pinned URLs are immutable.
      #
      # `pull_request` + same-repo gate: fork PRs get a read-only
      # GITHUB_TOKEN (GitHub design), so the push would 403. They
      # fall back to downloading the artifact above.
      - name: Push snapshot diff to preview branch (on test failure)
        if: failure() && matrix.configuration == 'Release' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Bail early if the staging step above produced nothing —
          # the test likely bailed before the PNG encoder ran. The
          # downstream comment step uses PREVIEW_SHA being non-empty
          # to decide whether to post.
          if [ ! -f artifact/snapshot-diff/new/overlay_snapshot.png ] \
             && [ ! -f artifact/snapshot-diff/old/overlay_snapshot.png ]; then
            echo "No staged PNGs - nothing to push."
            exit 0
          fi

          REL_PATH="pr-${PR_NUMBER}/run-${RUN_ID}-attempt-${RUN_ATTEMPT}"

          # Copy the PNGs OUT of the workspace before checking out the
          # orphan branch — `git checkout --orphan` followed by
          # `git rm -rf .` would otherwise wipe them.
          STAGE_DIR="$(mktemp -d)"
          [ -f artifact/snapshot-diff/new/overlay_snapshot.png ] \
            && cp artifact/snapshot-diff/new/overlay_snapshot.png "$STAGE_DIR/new.png"
          [ -f artifact/snapshot-diff/old/overlay_snapshot.png ] \
            && cp artifact/snapshot-diff/old/overlay_snapshot.png "$STAGE_DIR/old.png"

          # Fresh clone of just the preview branch (or init if it
          # doesn't exist yet) into a temp dir. Working outside
          # GITHUB_WORKSPACE avoids polluting the matrix job's tree.
          PREVIEW_DIR="$(mktemp -d)"
          cd "$PREVIEW_DIR"
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin snapshot-previews >/dev/null 2>&1; then
            git fetch --depth=1 origin snapshot-previews
            git checkout -q snapshot-previews
          else
            # First-ever failure on this repo: seed the orphan branch
            # with a README explaining what it is.
            git checkout -q --orphan snapshot-previews
            cat > README.md <<'README_EOF'
          # snapshot-previews

          Auto-managed branch carrying overlay snapshot diff PNGs referenced from
          PR comments posted by `build-and-release.yml` on snapshot test failure.

          Each `pr-<n>/run-<id>-attempt-<k>/` folder corresponds to one snapshot
          test failure on a PR and contains `old.png` (the committed golden at
          the time the test ran) plus `new.png` (the fresh render that failed
          comparison).

          Folders under a `pr-<n>/` prefix for closed PRs are safe to garbage
          collect — no code references them once the PR is merged or closed.

          Do not commit anything to this branch by hand.
          README_EOF
            git add README.md
          fi

          mkdir -p "$REL_PATH"
          [ -f "$STAGE_DIR/new.png" ] && cp "$STAGE_DIR/new.png" "$REL_PATH/new.png"
          [ -f "$STAGE_DIR/old.png" ] && cp "$STAGE_DIR/old.png" "$REL_PATH/old.png"
          git add "$REL_PATH"
          git commit -m "preview: snapshot diff for PR #${PR_NUMBER} run ${RUN_ID} attempt ${RUN_ATTEMPT}"

          # One retry on race: two concurrent failing PRs both
          # pushing at once. Per-PR/per-run paths can't conflict, so
          # rebase-then-push is conflict-free in practice.
          if ! git push origin snapshot-previews; then
            echo "Push collided - rebasing onto remote and retrying..."
            git fetch origin snapshot-previews
            if ! git rebase origin/snapshot-previews; then
              git rebase --abort 2>/dev/null || true
              echo "Rebase failed unexpectedly - skipping inline comment; reviewer falls back to artifact."
              exit 0
            fi
            if ! git push origin snapshot-previews; then
              echo "Retry push failed - skipping inline comment; reviewer falls back to artifact."
              exit 0
            fi
          fi

          PREVIEW_SHA="$(git rev-parse HEAD)"
          {
            echo "PREVIEW_SHA=${PREVIEW_SHA}"
            echo "PREVIEW_REL_PATH=${REL_PATH}"
            [ -f "$REL_PATH/new.png" ] && echo "PREVIEW_HAS_NEW=true" || echo "PREVIEW_HAS_NEW=false"
            [ -f "$REL_PATH/old.png" ] && echo "PREVIEW_HAS_OLD=true" || echo "PREVIEW_HAS_OLD=false"
          } >> "$GITHUB_ENV"

      # ---- Inline PR comment: upsert sticky comment ---------------------
      #
      # Looks up the sticky comment by an HTML-comment marker
      # (`<!-- snapshot-preview-bot -->`) authored by
      # `github-actions[bot]`. If present, PATCH; otherwise POST.
      # Single comment per PR — re-runs and new pushes update it in
      # place rather than spamming the PR with one per failure.
      #
      # `env.PREVIEW_SHA != ''` guards the case where the push step
      # above bailed (no staged PNGs / push collision retry failed).
      # Without it, this step would post a comment with broken
      # raw.githubusercontent.com URLs.
      - name: Upsert sticky PR comment with snapshot diff
        if: failure() && matrix.configuration == 'Release' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && env.PREVIEW_SHA != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
          PREVIEW_SHA: ${{ env.PREVIEW_SHA }}
          PREVIEW_REL_PATH: ${{ env.PREVIEW_REL_PATH }}
          PREVIEW_HAS_NEW: ${{ env.PREVIEW_HAS_NEW }}
          PREVIEW_HAS_OLD: ${{ env.PREVIEW_HAS_OLD }}
        run: |
          set -euo pipefail

          # github.com/<repo>/raw/<ref>/<path> (NOT raw.githubusercontent.com/...)
          # because the latter is an unauthenticated CDN and 404s for
          # private repos — same-domain github.com/.../raw/ goes through
          # the authenticated frontend that 302s to a signed CDN URL
          # for logged-in users with repo access. Pattern lifted from
          # opengisch/comment-pr-with-images (their `_get_github_image_url`).
          BASE_URL="https://github.com/${REPO}/raw/${PREVIEW_SHA}/${PREVIEW_REL_PATH}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}/attempts/${RUN_ATTEMPT}"
          UPDATE_WORKFLOW_URL="https://github.com/${REPO}/actions/workflows/update-overlay-snapshot.yml"

          # Compose the diff body conditionally on which PNGs the
          # push step managed to upload. Most common case is both
          # present (standard pixel diff).
          # Table header labels are intentionally short and symmetric
          # ("Actual" / "Expected") so the two markdown columns get
          # the same auto-layout width — long asymmetric labels make
          # the right column narrower and the image inside it visually
          # smaller. Column order matches the typical test-runner
          # ordering: actual (what we got, this PR's fresh render)
          # first, expected (golden) second.
          if [ "$PREVIEW_HAS_OLD" = "true" ] && [ "$PREVIEW_HAS_NEW" = "true" ]; then
            DIFF_BODY=$(cat <<EOF
          | Actual | Expected |
          |:--:|:--:|
          | ![actual](${BASE_URL}/new.png) | ![expected](${BASE_URL}/old.png) |
          EOF
          )
          elif [ "$PREVIEW_HAS_OLD" = "true" ]; then
            DIFF_BODY=$(cat <<EOF
          **Only the expected golden was captured** — the test bailed before producing the actual render. See the [run log](${RUN_URL}) for the first failed REQUIRE.

          ![expected](${BASE_URL}/old.png)
          EOF
          )
          elif [ "$PREVIEW_HAS_NEW" = "true" ]; then
            DIFF_BODY=$(cat <<EOF
          **Only the actual render was captured** — no expected golden exists yet (first-time seed).

          ![actual](${BASE_URL}/new.png)
          EOF
          )
          else
            DIFF_BODY="_No PNGs were captured. See [run log](${RUN_URL})._"
          fi

          BODY=$(cat <<EOF
          <!-- snapshot-preview-bot -->
          ## Overlay snapshot test failed

          The overlay snapshot test failed on run [\`${RUN_ID}\` attempt ${RUN_ATTEMPT}](${RUN_URL}).

          ${DIFF_BODY}

          <sub>If the new render is the intended change, run the [\`Update overlay snapshot golden\`](${UPDATE_WORKFLOW_URL}) workflow on this branch with \`commit\` ticked to update the baseline. Raw PNGs are also available as a downloadable artifact attached to this run.</sub>
          EOF
          )

          # Two-stage capture (full output, then head) so we never
          # SIGPIPE gh under `set -o pipefail` — same pattern as the
          # success-path step above.
          ALL_IDS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("<!-- snapshot-preview-bot -->"))) | .id')
          COMMENT_ID=$(echo "$ALL_IDS" | head -n1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing sticky comment ${COMMENT_ID}"
            jq -n --arg body "$BODY" '{body: $body}' \
              | gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            echo "Creating new sticky comment"
            jq -n --arg body "$BODY" '{body: $body}' \
              | gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" --input -
          fi

      # ---- Inno Setup installer (Release only) --------------------------
      # Produces a single Setup.exe that installs the DLL + JSON manifest
      # to Program Files (correct ACLs for sandboxed identities), registers
      # the layer in HKLM, and creates an Add/Remove Programs uninstaller.
      - name: Install Inno Setup
        if: matrix.configuration == 'Release'
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc /DMyAppVersion=$env:LAYER_VERSION "installer\installer.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC.exe returned $LASTEXITCODE"
          }
          $exe = Get-ChildItem "bin\installer\*.exe" | Select-Object -First 1
          Write-Host "Installer built: $($exe.Name) ($($exe.Length) bytes)"

      # Sign the installer too — SmartScreen "Unknown publisher" warnings
      # are gated on the installer's own signature, not on whatever it
      # bundles. We sign AFTER ISCC because Inno Setup rewrites the
      # generated .exe (compresses payload, embeds the uninstaller stub),
      # which would invalidate any pre-existing signature.
      - name: Sign installer (Certum SimplySign)
        # should_sign already implies matrix.configuration == 'Release',
        # so no additional matrix gate is needed here.
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        env:
          CERTUM_USERNAME:        ${{ secrets.CERTUM_USERNAME }}
          CERTUM_TOTP_SEED:       ${{ secrets.CERTUM_TOTP_SEED }}
          CERTUM_CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT }}
        run: |
          .\scripts\Sign-Artifact.ps1 -Path "bin\installer\*.exe"

      - name: Upload installer artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LAYER_NAME }}-Setup-x64
          path: bin/installer/*.exe
          if-no-files-found: error
          retention-days: 30

      # Stage the files a user actually needs to install the layer:
      # the DLL, its PDB, the processed JSON manifest, and the install scripts.
      # We do NOT zip here — actions/upload-artifact@v4 zips on its own, and
      # pre-zipping would double-wrap the payload.
      - name: Stage artifacts
        shell: pwsh
        run: |
          $configuration = "${{ matrix.configuration }}"
          $layer         = "${{ env.LAYER_NAME }}"
          $outDir        = "bin\x64\$configuration"
          $stageDir      = "stage\$layer-$configuration-x64"

          if (-not (Test-Path $outDir)) {
            throw "Build output not found at $outDir"
          }

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item "$outDir\$layer.dll"          $stageDir -ErrorAction Stop
          Copy-Item "$outDir\$layer.pdb"          $stageDir -ErrorAction SilentlyContinue
          Copy-Item "$outDir\$layer.json"         $stageDir -ErrorAction Stop
          Copy-Item "$outDir\Install-Layer.ps1"   $stageDir -ErrorAction Stop
          Copy-Item "$outDir\Uninstall-Layer.ps1" $stageDir -ErrorAction Stop

          # Short install note so the archive is self-explanatory once unzipped.
          # Built as an array to avoid YAML/here-string indentation leaking into
          # the file.
          $readme = @(
            "$layer - $configuration x64"
            "================================================================"
            ""
            "Install (HKLM, requires elevated PowerShell):"
            "  powershell -ExecutionPolicy Bypass -File .\Install-Layer.ps1"
            ""
            "Uninstall:"
            "  powershell -ExecutionPolicy Bypass -File .\Uninstall-Layer.ps1"
            ""
            "To disable the layer without uninstalling, set the environment"
            "variable declared under ``disable_environment`` in $layer.json"
            "to ""1"" for the target process."
          ) -join "`r`n"
          Set-Content -Path "$stageDir\README.txt" -Value $readme -Encoding UTF8

          "Staged:" | Out-Host
          Get-ChildItem $stageDir | Format-Table Name, Length -AutoSize | Out-Host

      # upload-artifact@v4 wraps `path` in a ZIP named `<name>.zip`.
      # Pointing at the stage directory (not a pre-made ZIP) gives us a
      # clean single-level ZIP: `<name>.zip` → DLL + PDB + JSON + PS1 at root.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LAYER_NAME }}-${{ matrix.configuration }}-x64
          path: stage/${{ env.LAYER_NAME }}-${{ matrix.configuration }}-x64/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release: only runs on a v*.*.* tag push. Pulls both matrix artifacts
  # down from the `build` job and attaches them to a GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # download-artifact@v4 materializes each artifact as a folder under
      # `path`: `artifacts/<artifact-name>/<files>`. We re-zip each folder
      # into a clean release asset named `<artifact-name>.zip`.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *-Setup-* ]]; then
              # Installer .exe — copy directly, do not zip.
              cp "$name"/*.exe ../release/
            else
              # Standard artifact — zip into release.
              ( cd "$name" && zip -r "../../release/${name}.zip" . )
            fi
          done
          ls -la ../release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: ${{ github.ref_name }}
          body: |
            ## ${{ env.LAYER_NAME }} ${{ github.ref_name }}

            OpenXR API layer built from commit `${{ github.sha }}`.

            ### Assets
            | File | Description |
            |------|-------------|
            | `${{ env.LAYER_NAME }}-*-x64-Setup.exe` | **Installer (recommended)** — installs to Program Files, registers the layer, creates uninstaller in Add/Remove Programs |
            | `${{ env.LAYER_NAME }}-Release-x64.zip` | ZIP for manual install (DLL + JSON + PowerShell scripts) |
            | `${{ env.LAYER_NAME }}-Debug-x64.zip` | Debug build with full symbols, for troubleshooting |

            ### Install (installer)
            1. Download the `...-Setup.exe` above.
            2. Run it — admin elevation is handled automatically.
            3. The layer is installed to `C:\Program Files\OpenXR-Layer-xr_telemetry\`
               and registered with the OpenXR loader.

            ### Install (manual / ZIP)
            1. Download `...-Release-x64.zip` and unzip to a **permanent** location.
            2. Open an **elevated** PowerShell and run:
               ```powershell
               powershell -ExecutionPolicy Bypass -File .\Install-Layer.ps1
               ```

            ### Uninstall
            - **Installer**: Settings → Apps → ${{ env.LAYER_NAME }} → Uninstall
            - **Manual**: run `Uninstall-Layer.ps1` from an elevated PowerShell

            ### Disable without uninstalling
            Set the environment variable `DISABLE_${{ env.LAYER_NAME }}=1` for the
            target process.

            > 🔒 Signed with a **Certum Open Source Code Signing Cloud** certificate
            > (subject: *Open Source Developer Michael Ledour*). Verify locally with:
            > ```powershell
            > signtool verify /pa /v <file>.exe
            > ```
            > Windows SmartScreen may still warn ("Unknown publisher") on early
            > downloads until the publisher reputation builds with volume.
            > Anti-cheat systems may flag any OpenXR layer DLL — even a signed
            > one — when loaded into a hooked game.
